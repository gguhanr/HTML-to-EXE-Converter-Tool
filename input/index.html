<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Desktop App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0D0D1A 0%, #1A0030 50%, #000D1A 100%);
      min-height: 100vh;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    canvas#bg {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; opacity: 0.3;
    }

    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0, 229, 255, 0.2);
      border-radius: 20px;
      padding: 48px 56px;
      max-width: 540px;
      width: 90%;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(0,229,255,0.08), 0 0 0 1px rgba(255,255,255,0.04);
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 { font-size: 2.2rem; font-weight: 700; color: #00E5FF; margin-bottom: 8px; }
    p.sub { color: #888; font-size: 0.95rem; margin-bottom: 32px; }

    .counter {
      font-size: 4rem; font-weight: 900;
      color: #fff;
      text-shadow: 0 0 30px rgba(0,229,255,0.6);
      margin: 16px 0;
      transition: transform 0.1s;
    }

    .btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 16px 0; }

    button {
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary { background: #7B2FFF; color: #fff; }
    .btn-primary:hover { background: #5B1FDF; transform: scale(1.05); }

    .btn-accent { background: #00E5FF; color: #000; }
    .btn-accent:hover { background: #00C4D9; transform: scale(1.05); }

    .btn-ghost { background: transparent; color: #aaa; border: 1px solid #333; }
    .btn-ghost:hover { border-color: #00E5FF; color: #00E5FF; }

    .storage-note {
      margin-top: 24px;
      padding: 12px 16px;
      border-radius: 10px;
      background: rgba(0,229,255,0.07);
      border: 1px solid rgba(0,229,255,0.15);
      font-size: 0.85rem;
      color: #aaa;
    }
    .storage-note span { color: #00E5FF; font-weight: 600; }

    .footer {
      position: fixed; bottom: 16px; right: 20px;
      font-size: 0.75rem; color: #333; z-index: 10;
    }
  </style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="card">
  <h1>🚀 My Desktop App</h1>
  <p class="sub">Built with HTML TO EXE CONVERTER<br>Developed by Guhan S</p>

  <div class="counter" id="count">0</div>

  <div class="btns">
    <button class="btn-primary" onclick="increment()">＋ Increment</button>
    <button class="btn-accent"  onclick="decrement()">－ Decrement</button>
    <button class="btn-ghost"   onclick="resetCount()">↺ Reset</button>
  </div>

  <div class="storage-note">
    Counter is saved via <span>localStorage</span>.<br>
    Reopen the app — your count persists!
  </div>
</div>

<div class="footer">HTML TO EXE · Developed by Guhan S</div>

<script>
  // --- Particle background ---
  const canvas = document.getElementById("bg");
  const ctx = canvas.getContext("2d");
  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener("resize", resize);

  for (let i = 0; i < 80; i++) {
    particles.push({
      x: Math.random() * 2000,
      y: Math.random() * 1200,
      r: Math.random() * 1.5 + 0.3,
      dx: (Math.random() - 0.5) * 0.3,
      dy: (Math.random() - 0.5) * 0.3
    });
  }

  function drawParticles() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = "#00E5FF";
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x % W, p.y % H, p.r, 0, Math.PI * 2);
      ctx.fill();
      p.x = (p.x + p.dx + W) % W;
      p.y = (p.y + p.dy + H) % H;
    });
    requestAnimationFrame(drawParticles);
  }
  drawParticles();

  // --- Counter with localStorage ---
  let count = parseInt(localStorage.getItem("myapp_count") || "0");

  function updateDisplay() {
    document.getElementById("count").textContent = count;
  }

  function increment() {
    count++;
    localStorage.setItem("myapp_count", count);
    updateDisplay();
    pulse();
  }

  function decrement() {
    count--;
    localStorage.setItem("myapp_count", count);
    updateDisplay();
    pulse();
  }

  function resetCount() {
    count = 0;
    localStorage.setItem("myapp_count", 0);
    updateDisplay();
  }

  function pulse() {
    const el = document.getElementById("count");
    el.style.transform = "scale(1.3)";
    setTimeout(() => el.style.transform = "scale(1)", 120);
  }

  updateDisplay();
</script>
</body>
</html>
